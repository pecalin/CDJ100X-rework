# CDJ-100X Configuration
# Edit this file on each unit to set unique player number

[player]
# Player number on the Pro DJ Link network (1-4, must be unique per unit)
number = 1

# Device name shown to other Pro DJ Link devices
name = CDJ-100X

[network]
# Ethernet interface for Pro DJ Link
interface = eth0

# Use link-local addressing (169.254.x.x) for direct cable connection
# Set to "dhcp" if using a network with a DHCP server
addressing = link-local
